<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Number Guessing Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="guesser.jpeg" alt="Game Icon">
      <div>
        <h1>Number Guessing Game</h1>
        <div class="lead">Test your luck!</div>
      </div>
    </header>

    <nav class="nav">
      <a href="index.html">Home</a> |
      <a href="bass.html">Bass</a> |
      <a href="game.html">Game</a>
    </nav>

    <main class="card">
      <h2>Guess the Number</h2>
      <p>I'm thinking of a number between 1 and 100. Try to guess it!</p>
      <input id="guess" type="number" min="1" max="100" placeholder="Enter your guess">
      <div style="display:flex;gap:8px;margin:8px 0;">
        <button id="check">Check</button>
        <button id="new">New Game</button>
      </div>
      <p class="log" id="log">Good luck!</p>
    </main>

    <footer class="footer">© Wyatt Pickett — Game</footer>
  </div>

  <script>
    let secret, attempts;
    function newGame(){
      secret = Math.floor(Math.random()*100)+1;
      attempts = 0;
      document.getElementById('log').textContent = 'New game started.';
      document.getElementById('guess').value = '';
    }
    document.getElementById('check').addEventListener('click', ()=>{
      const val = Number(document.getElementById('guess').value);
      if(!val){document.getElementById('log').textContent='Enter a number first.'; return}
      attempts++;
      if(val===secret) document.getElementById('log').textContent = `Correct! You got it in ${attempts} attempts.`;
      else if(val<secret) document.getElementById('log').textContent = 'Too low — try higher.';
      else document.getElementById('log').textContent = 'Too high — try lower.';
    });
    document.getElementById('new').addEventListener('click', newGame);
    newGame();
  </script>
</body>
</html>
